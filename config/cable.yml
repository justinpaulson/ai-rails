# Use solid_cable in development to support cross-process communication.
# Background jobs (bin/jobs) broadcast updates to the web process via this.
# The async adapter only works within the same process and breaks with separate job workers.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
